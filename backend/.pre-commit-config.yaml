# Pre-commit hooks for backend
repos:
  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest with coverage
        entry: bash -c 'cd backend && python -m pytest tests/ --cov=app --cov-fail-under=80 -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
