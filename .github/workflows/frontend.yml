name: Frontend CI

on:
  pull_request:
    paths: ["apps/**", "packages/**"]
  push:
    branches: [main]
    paths: ["apps/**", "packages/**"]

jobs:
  patient-portal:
    name: Patient Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/patient-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/patient-portal/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  clinician-portal:
    name: Clinician Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/clinician-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/clinician-portal/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
