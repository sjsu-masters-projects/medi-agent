version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  patient-portal:
    build:
      context: ./apps/patient-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./apps/patient-portal/src:/app/src
    command: npm run dev

  clinician-portal:
    build:
      context: ./apps/clinician-portal
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./apps/clinician-portal/src:/app/src
    command: npm run dev
